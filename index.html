<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burrito Bison</title>
  <link rel="stylesheet" href="style.css">

  <script>
    window.kongregate = {
      services: { connect: () => {} },
      stats: { submit: (a,b) => console.log("Stat:", a, b) },
      payments: { showRegDialog: () => {} },
      getUsername: () => "Guest",
      getUserId: () => 0
    };
  </script>

  <script src="UnityProgress.js"></script>
  <script src="burrito-bison-ll.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    .webgl-content {
      width: 100%;
      height: 100%;
    }

    #gameContainer {

<body>
  <div class="webgl-content">
    <div id="gameContainer"></div>
  </div>

  <script>
    var gameInstance = UnityLoader.instantiate("gameContainer", "burrito-bison-ll.json", {
      onProgress: UnityProgress,
      Module: {
        onRuntimeInitialized: () => UnityProgress(gameInstance, "complete")
      }
    });
  </script>
</body>
